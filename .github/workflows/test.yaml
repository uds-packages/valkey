name: Test

on:
  # This workflow is triggered on pull requests to the main branch.
  pull_request:
    # milestoned is added here as a way to retrigger workflows that are stuck or otherwise didn't run correctly
    types: [milestoned, opened, reopened, synchronize]

# Permissions for the GITHUB_TOKEN used by the workflow.
permissions:
  contents: read # Allows reading the content of the repository.
  packages: read # Allows reading the content of the repository's packages.
  id-token: write
  pull-requests: read

# Abort prior jobs in the same workflow / PR
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-flavor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: test-flavor
        uses: defenseunicorns/uds-common/.github/actions/test-flavor@ef8767c2d84fc4d23c37f3b7dac3c6292ee76c11 # v1.25.0
        id: test-flavor
    outputs:
      upgrade-flavors: ${{ steps.test-flavor.outputs.upgrade-flavors }}

  validate:
    needs: check-flavor
    strategy:
      fail-fast: true
      matrix:
        type: [install, upgrade]
        flavor: [upstream, unicorn]
    uses: defenseunicorns/uds-common/.github/workflows/callable-test.yaml@ef8767c2d84fc4d23c37f3b7dac3c6292ee76c11 # v1.25.0
    with:
      options: --set BASE_REPO="ghcr.io/uds-packages"
      upgrade-flavors: ${{ needs.check-flavor.outputs.upgrade-flavors }}
      flavor: ${{ matrix.flavor }}
      type: ${{ matrix.type }}
      runsOn: appstore-8-core-amd64
    secrets: inherit # Inherits all secrets from the parent workflow.

  verify-test:
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Check validate result
        run: |
          echo "validate result: ${{ needs.validate.result }}"

          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "One or more tests failed."
            exit 1
          fi

          echo "All tests passed successfully!"
